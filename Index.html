<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presensi Pegawai BPBD Provinsi Kalimantan Selatan</title>
  <link rel="icon" href="https://avatars.githubusercontent.com/u/295258675?v=4" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .loading-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 80%;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #ff6b00; /* Warna jingga khas BPBD */
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h3 { color: #333; margin-bottom: 8px; }
    p { color: #666; font-size: 14px; margin-bottom: 20px; }
    .btn-manual {
      display: inline-block;
      padding: 10px 20px;
      background-color: #ff6b00;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 14px;
    }
  </style>
  
  <script type="text/javascript">
    // URL Apps Script Anda
    const webAppUrl = "https://script.google.com/a/*/macros/s/AKfycbzz6LlfY7pefQ4s2LTwuTKhTpylqKOT3EjPDWOT7icfGUms0c5WNxqBUjf15MKqwl9NYg/exec";

    // Eksekusi pengalihan otomatis saat halaman dimuat
    window.location.replace(webAppUrl);
  </script>
</head>
<body>

  <div class="loading-box">
    <div class="spinner"></div>
    <h3>Menghubungkan ke Presensi BPBD Kalsel...</h3>
    <p>Mohon tunggu, Anda sedang dialihkan secara aman agar terhindar dari error akun.</p>
    <a href="https://script.google.com/a/*/macros/s/AKfycbzz6LlfY7pefQ4s2LTwuTKhTpylqKOT3EjPDWOT7icfGUms0c5WNxqBUjf15MKqwl9NYg/exec" class="btn-manual">Klik di sini jika tidak beralih</a>
  </div>

</body>
</html>
